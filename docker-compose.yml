version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pricepulse-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: pricepulse
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d pricepulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pricepulse-backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3010:3000"

  frontend:
    build: ./frontend
    container_name: pricepulse-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
